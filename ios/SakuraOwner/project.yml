name: SakuraOwner
options:
  bundleIdPrefix: com.sakuraasiandining
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "2"
    SUPPORTS_MACCATALYST: NO
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
targets:
  SakuraOwner:
    type: application
    platform: iOS
    sources:
      - path: SakuraOwner
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sakuraasiandining.owner
        PRODUCT_NAME: SakuraOwner
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: SakuraOwner/SakuraOwner.entitlements
        INFOPLIST_KEY_CFBundleDisplayName: Sakura Reservations
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.business
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIRequiresFullScreen: NO
        INFOPLIST_KEY_UIStatusBarStyle: UIStatusBarStyleLightContent
    scheme:
      testTargets:
        - SakuraOwnerTests
  SakuraOwnerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SakuraOwnerTests
    dependencies:
      - target: SakuraOwner
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sakuraasiandining.owner.tests
schemes:
  SakuraOwner:
    build:
      targets:
        SakuraOwner: all
        SakuraOwnerTests: [test]
    test:
      targets:
        - SakuraOwnerTests
